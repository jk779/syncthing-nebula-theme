name: Build and publish container

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve the upstream Syncthing digest
        id: upstream
        run: |
          echo "digest=$(docker buildx imagetools inspect syncthing/syncthing:latest --format '{{.Manifest.Digest}}')" >> "$GITHUB_OUTPUT"

      - name: Read the published upstream digest
        id: published
        run: |
          image="${REGISTRY}/${IMAGE_NAME}:latest"
          if labels="$(docker buildx imagetools inspect "$image" --format '{{json .Image.Config.Labels}}')"; then
            digest="$(jq -r '."org.opencontainers.image.base.digest" // empty' <<<"$labels")"
            echo "digest=$digest" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and publish the container
        if: github.event_name != 'schedule' || steps.upstream.outputs.digest != steps.published.outputs.digest
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.base.digest=${{ steps.upstream.outputs.digest }}
